<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonviel Deobfuscator Web</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; text-align: center; }
        textarea { width: 100%; height: 200px; background: #2d2d2d; color: #00ff00; border: 1px solid #444; font-family: monospace; padding: 10px; box-sizing: border-box; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 5px; margin: 15px 0; }
        button:hover { background: #0056b3; }
        .container { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Moonviel Advanced Deobfuscator v3.0</h2>
    <p>أدخل كود Lua المشفر هنا:</p>
    <textarea id="inputCode" placeholder="ضع الكود هنا..."></textarea>
    
    <button onclick="processCode()">فك التشفير ✨</button>
    
    <p>النتيجة:</p>
    <textarea id="outputCode" readonly placeholder="النتيجة ستظهر هنا..."></textarea>
</div>

<script>
    async function processCode() {
        const input = document.getElementById('inputCode').value;
        const output = document.getElementById('outputCode');
        output.value = "جاري فك التشفير... انتظر قليلاً";

        try {
            const response = await fetch('/api/deobfuscate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: input })
            });
            const data = await response.json();
            output.value = data.result;
        } catch (err) {
            output.value = "❌ حدث خطأ في الاتصال بالسيرفر!";
        }
    }
</script>

</body>
</html>
