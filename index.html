<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonviel Advanced Deobfuscator v3.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; text-align: center; font-size: 24px; margin-bottom: 5px; }
        .credits { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        textarea { width: 100%; height: 250px; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #38bdf8; padding: 15px; font-family: 'Courier New', Courier, monospace; box-sizing: border-box; resize: vertical; }
        .btn-container { display: flex; gap: 15px; margin: 20px 0; }
        button { flex: 1; padding: 12px; background: #0284c7; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; font-size: 16px; }
        button:hover { background: #0369a1; }
        button.secondary { background: #475569; }
        button.secondary:hover { background: #334155; }
        pre { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; overflow-x: auto; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; color: #4ade80; max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔓 Moonviel Advanced Deobfuscator v3.0</h1>
    <div class="credits">طُور بواسطة Harbawi (@j_w_j_m)</div>
    
    <label for="inputCode">قم بلصق السكربت المشفر هنا:</label>
    <textarea id="inputCode" placeholder="-- ضع كود MoonVeil هنا..."></textarea>
    
    <div class="btn-container">
        <button onclick="sendToDeobfuscate()">فك التشفير الآن ⚡</button>
        <button class="secondary" onclick="copyOutput()">نسخ الكود الناتج 📋</button>
    </div>
    
    <label>الكود الناتج بعد التطهير الحركي:</label>
    <pre id="outputCode">في انتظار إرسال السكربت...</pre>
</div>

<script>
    async function sendToDeobfuscate() {
        const codeInput = document.getElementById('inputCode').value;
        const outputFrame = document.getElementById('outputCode');
        
        if(!codeInput.trim()) { alert('الرجاء إدخال كود لتفكيكه أولاً!'); return; }
        
        outputFrame.innerText = "⏳ جاري تحليل الأنماط وفك تشفير الـ XOR الحركي...";
        
        try {
            const response = await fetch('/api/deobfuscate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: codeInput })
            });
            const data = await response.json();
            outputFrame.innerText = data.deobfuscated || data.error;
        } catch (err) {
            outputFrame.innerText = "❌ فشل الاتصال بالخادم الافتراضي للـ Backend.";
        }
    }

    function copyOutput() {
        const text = document.getElementById('outputCode').innerText;
        navigator.clipboard.writeText(text);
        alert('تم نسخ الكود المفكك إلى الحافظة بنجاح!');
    }
</script>
</body>
</html>
